services:
  # 1. Python Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "${WORDLINE_BACKEND_PORT:-8000}:8000"
    restart: unless-stopped

  # 2. Frontend (React + Caddy Proxy)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "${WORDLINE_FRONTEND_PORT:-8080}:80"
    depends_on:
      - backend
    restart: unless-stopped
